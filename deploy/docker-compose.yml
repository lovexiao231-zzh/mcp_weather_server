version: '3.8'

services:
  mcp-weather-server:
    image: lovexiao2311/mcp_weather_server:latest
    container_name: mcp-weather-server
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      - TZ=Asia/Shanghai
    command: ["--mode", "streamable-http", "--host", "0.0.0.0", "--port", "8085"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/mcp"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - mcp-network

networks:
  mcp-network:
    driver: bridge